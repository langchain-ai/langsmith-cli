name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            go-version: '1.23'
            build-output: langsmith
          - os: ubuntu-latest
            go-version: '1.24'
            build-output: langsmith
          - os: windows-latest
            go-version: '1.24'
            build-output: langsmith.exe
          - os: macos-latest
            go-version: '1.24'
            build-output: langsmith
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o ${{ matrix.build-output }} ./cmd/langsmith
        env:
          CGO_ENABLED: 0

  installer-smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Smoke test install.sh
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p "$RUNNER_TEMP/langsmith-bin"
          INSTALL_DIR="$RUNNER_TEMP/langsmith-bin" sh scripts/install.sh
          "$RUNNER_TEMP/langsmith-bin/langsmith" --version

      - name: Smoke test install.ps1
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $installDir = Join-Path $env:RUNNER_TEMP "langsmith-bin"
          & .\scripts\install.ps1 -InstallDir $installDir
          & (Join-Path $installDir "langsmith.exe") --version

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
